<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Twitch Watch Time — Settings</title>
  <style>
    body {
      font-family: ui-monospace, "DM Mono", monospace;
      background: #0d1a14;
      color: #d4e4d6;
      padding: 2rem;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-weight: 400; font-size: 1.4rem; }
    label { display: block; margin-top: 1.2rem; font-size: 0.85rem; opacity: 0.7; }
    input {
      width: 100%; padding: 0.6rem; margin-top: 0.3rem;
      background: #16271e; border: 1px solid #2a4a36;
      color: #d4e4d6; border-radius: 4px; font-family: inherit;
    }
    button {
      margin-top: 1.5rem; padding: 0.6rem 1.2rem;
      background: #2a4a36; color: #d4e4d6;
      border: none; border-radius: 4px; cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #3a6048; }
    .status { margin-top: 1rem; font-size: 0.85rem; opacity: 0.7; }
    .stat { margin-top: 0.4rem; }
  </style>
</head>
<body>
  <h1>Twitch Watch Time Logger</h1>
  <label>API URL <small>(e.g. https://watch.jwsoat.co.nz)</small></label>
  <input id="apiUrl" type="url" placeholder="https://...">
  <label>API Key</label>
  <input id="apiKey" type="password">
  <button id="save">Save</button>
  <div class="status">
    <div class="stat">Client ID: <span id="clientId">—</span></div>
    <div class="stat">Queued heartbeats: <span id="queueLen">—</span></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
