<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Watch Time Logger — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1a14;
      color: #d4e4d6;
      font-family: 'DM Mono', 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .panel {
      width: 100%;
      max-width: 460px;
      background: #16271e;
      border: 1px solid #2a4a36;
      border-radius: 6px;
      padding: 28px 32px 32px;
    }

    h1 {
      font-size: 13px;
      font-weight: 500;
      color: #8fca9c;
      letter-spacing: 0.1em;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      color: #6a9a78;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="url"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #0d1a14;
      border: 1px solid #2a4a36;
      border-radius: 4px;
      color: #d4e4d6;
      font-family: inherit;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #4a8a5a; }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 22px;
      margin-bottom: 28px;
    }

    button {
      background: #2a4a36;
      border: 1px solid #3a6a4a;
      border-radius: 4px;
      color: #d4e4d6;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 7px 18px;
      transition: background 0.15s;
    }

    button:hover { background: #3a5a46; }
    button:active { background: #1d3629; }

    .status-msg {
      font-size: 12px;
      color: #8fca9c;
      min-height: 16px;
    }

    .status-msg.error { color: #d07070; }

    hr {
      border: none;
      border-top: 1px solid #2a4a36;
      margin-bottom: 22px;
    }

    .info-grid { display: grid; gap: 14px; }

    .info-label {
      font-size: 11px;
      color: #6a9a78;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .info-value {
      background: #0d1a14;
      border: 1px solid #2a4a36;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 12px;
      color: #8fca9c;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>WATCH TIME LOGGER</h1>

    <div class="field">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" type="url" placeholder="http://your-server:8765">
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="paste your key">
    </div>

    <div class="field">
      <label for="twitchUser">Twitch Username</label>
      <input id="twitchUser" type="text" placeholder="your login name">
    </div>

    <div class="field">
      <label for="youtubeUser">YouTube Username</label>
      <input id="youtubeUser" type="text" placeholder="your YouTube channel handle">
    </div>

    <div class="field">
      <label for="xUser">X Username</label>
      <input id="xUser" type="text" placeholder="your X (Twitter) handle">
    </div>

    <div class="field">
      <label for="facebookUser">Facebook Username</label>
      <input id="facebookUser" type="text" placeholder="your Facebook handle">
    </div>

    <div class="field">
      <label for="instagramUser">Instagram Username</label>
      <input id="instagramUser" type="text" placeholder="your Instagram handle">
    </div>

    <div class="field">
      <label for="plexUser">Plex Username</label>
      <input id="plexUser" type="text" placeholder="your Plex username">
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <span class="status-msg" id="statusMsg"></span>
    </div>

    <hr>

    <div class="info-grid">
      <div>
        <div class="info-label">Client ID</div>
        <div class="info-value" id="clientId">—</div>
      </div>
      <div>
        <div class="info-label">Twitch Queue</div>
        <div class="info-value" id="queueLen">—</div>
      </div>
      <div>
        <div class="info-label">YouTube Queue</div>
        <div class="info-value" id="ytQueueLen">—</div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
